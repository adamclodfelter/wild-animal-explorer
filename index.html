const pastelBg = ["#FFF0F6","#FFF4E6","#F0F4FF","#F0FFF4","#FFF9E6","#F5F0FF"];

function getRandomAnimal(currentName) {
  const filtered = ANIMALS.filter(a => a.name !== currentName);
  return filtered[Math.floor(Math.random() * filtered.length)];
}

function AnimalExplorer() {
  const [animal, setAnimal] = React.useState(null);
  const [bgColor, setBgColor] = React.useState("#F0F8FF");
  const [bounce, setBounce] = React.useState(false);
  const [imgError, setImgError] = React.useState(false);
  const [favorites, setFavorites] = React.useState([]);
  const [factIndex, setFactIndex] = React.useState(0);
  const [view, setView] = React.useState("explore");
  const [quiz, setQuiz] = React.useState(null);
  const [quizScore, setQuizScore] = React.useState({ correct: 0, total: 0 });
  const [animalImages, setAnimalImages] = React.useState([]);
  const [imageIndex, setImageIndex] = React.useState(0);
  const [imageLoading, setImageLoading] = React.useState(false);
  const [reportCopied, setReportCopied] = React.useState(false);

  function reportBadPhoto() {
    const msg = `Bad photo: ${animal?.name} - photo ${imageIndex + 1} of ${animalImages.length} - URL: ${animalImages[imageIndex]}`;
    navigator.clipboard.writeText(msg).then(() => {
      setReportCopied(true);
      setTimeout(() => setReportCopied(false), 2500);
    });
  }

  async function fetchWikipediaImages(animalName) {
    try {
      setImageLoading(true);
      setAnimalImages([]);
      setImageIndex(0);

      const BAD_KEYWORDS = ["map", "range", "distribution", "iucn", "status", "conservation", "icon", "logo", "flag", "diagram", "chart", "graph", "taxonomy", "cladogram", "silhouette", "symbol", "sign", "button", "stamp", "coin", "extinct", "threatened", "skull", "skeleton", "fossil", "museum"];

      function isBadImage(title) {
        if (!title) return false;
        const t = title.toLowerCase();
        return BAD_KEYWORDS.some(k => t.includes(k));
      }

      const imgs = [];

      // Source 1: Wikipedia summary — best single representative photo
      try {
        const summaryRes = await fetch(
          `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(animalName)}`
        );
        const summaryData = await summaryRes.json();
        const mainImg = summaryData?.originalimage?.source || summaryData?.thumbnail?.source || null;
        if (mainImg && !isBadImage(mainImg)) imgs.push(mainImg);
      } catch(e) {}

      // Source 2: iNaturalist — pure wildlife photography, no charts ever
      try {
        const inatRes = await fetch(
          `https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(animalName)}&per_page=1&rank=species`
        );
        const inatData = await inatRes.json();
        const taxon = inatData?.results?.[0];
        if (taxon) {
          // Get observations with photos for this taxon
          const obsRes = await fetch(
            `https://api.inaturalist.org/v1/observations?taxon_id=${taxon.id}&per_page=6&order=votes&order_by=votes&photos=true&quality_grade=research`
          );
          const obsData = await obsRes.json();
          const inatImgs = (obsData?.results || [])
            .flatMap(obs => obs.photos || [])
            .map(p => p.url?.replace("square", "medium"))
            .filter(Boolean)
            .filter(url => !imgs.includes(url))
            .slice(0, 2);
          imgs.push(...inatImgs);
        }
      } catch(e) {}

      setAnimalImages(imgs.slice(0, 3));
    } catch(e) {
      setAnimalImages([]);
    }
    setImageLoading(false);
  }

  function discover() {
    setBounce(false);
    setImgError(false);
    setFactIndex(0);
    setImageIndex(0);
    const next = getRandomAnimal(animal?.name);
    setAnimal(next);
    setBgColor(pastelBg[Math.floor(Math.random() * pastelBg.length)]);
    setTimeout(() => setBounce(true), 50);
    fetchWikipediaImages(next.name);
  }

  function toggleFavorite(a) {
    setFavorites(prev =>
      prev.find(f => f.name === a.name)
        ? prev.filter(f => f.name !== a.name)
        : [...prev, a]
    );
  }

  const isFavorited = animal && favorites.find(f => f.name === animal.name);

  function startQuiz() {
    setView("quiz");
    nextQuizQuestion(null);
  }

  function nextQuizQuestion(currentAnimal) {
    const pool = ANIMALS.filter(a => a.name !== currentAnimal?.name);
    const correct = pool[Math.floor(Math.random() * pool.length)];
    const wrong = ANIMALS.filter(a => a.name !== correct.name);
    const wrongPicks = wrong.sort(() => 0.5 - Math.random()).slice(0, 3);
    const choices = [...wrongPicks, correct].sort(() => 0.5 - Math.random());
    setQuiz({ animal: correct, choices, selected: null, correct: false });
  }

  function handleQuizAnswer(choice) {
    if (quiz.selected) return;
    const correct = choice.name === quiz.animal.name;
    setQuiz(q => ({ ...q, selected: choice.name, correct }));
    setQuizScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: view === "favorites" ? "#FFF9E6" : view === "quiz" ? "#F0FFF4" : bgColor,
      transition: "background 0.6s ease",
      fontFamily: "'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      padding: "20px 16px 40px",
    }}>
      <div style={{ textAlign: "center", marginBottom: "20px", width: "100%", maxWidth: "480px" }}>
        <div style={{ fontSize: "48px", lineHeight: 1 }}>🌍</div>
        <h1 style={{ fontSize: "clamp(28px, 6vw, 42px)", fontWeight: 900, color: "#2D3436", margin: "8px 0 4px", letterSpacing: "-0.5px" }}>Wild Animal Explorer</h1>
        <p style={{ color: "#636E72", fontSize: "16px", margin: 0 }}>Discover amazing animals from around the world!</p>
        <div style={{ display: "flex", gap: "8px", justifyContent: "center", marginTop: "16px", flexWrap: "wrap" }}>
          {[
            { id: "explore", label: "🔍 Explore", activeColor: "linear-gradient(135deg, #6C5CE7, #a29bfe)" },
            { id: "favorites", label: "❤️ Favorites", activeColor: "linear-gradient(135deg, #E84393, #fd79a8)" },
            { id: "quiz", label: "🧠 Quiz", activeColor: "linear-gradient(135deg, #F39C12, #FDCB6E)" },
          ].map(tab => (
            <button key={tab.id} onClick={() => tab.id === "quiz" ? startQuiz() : setView(tab.id)} style={{
              background: view === tab.id ? tab.activeColor : "white",
              color: view === tab.id ? "white" : "#636E72",
              border: "2px solid", borderColor: view === tab.id ? "transparent" : "#E0E0E0",
              borderRadius: "50px", padding: "10px 20px", fontSize: "15px", fontWeight: 800,
              cursor: "pointer", fontFamily: "inherit",
            }}>
              {tab.label}{tab.id === "favorites" && favorites.length > 0 && (
                <span style={{ background: "#E84393", color: "white", borderRadius: "50%", fontSize: "11px", fontWeight: 900, padding: "1px 6px", marginLeft: "6px" }}>{favorites.length}</span>
              )}
            </button>
          ))}
        </div>
      </div>

      {view === "explore" && (
        <>
          <button onClick={discover} style={{
            background: "linear-gradient(135deg, #6C5CE7, #a29bfe)", color: "white", border: "none",
            borderRadius: "50px", padding: "18px 44px", fontSize: "22px", fontWeight: 800,
            cursor: "pointer", boxShadow: "0 6px 20px rgba(108,92,231,0.4)", fontFamily: "inherit",
          }}>{animal ? "🎲 New Animal!" : "🐾 Discover an Animal!"}</button>

          {animal && (
            <div style={{
              marginTop: "28px", width: "100%", maxWidth: "480px",
              opacity: bounce ? 1 : 0,
              transform: bounce ? "translateY(0) scale(1)" : "translateY(20px) scale(0.97)",
              transition: "all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)",
            }}>
              <div style={{ background: "white", borderRadius: "24px", overflow: "hidden", boxShadow: "0 8px 32px rgba(0,0,0,0.08)", marginBottom: "14px", textAlign: "center", borderTop: `6px solid ${animal.color}` }}>
                <div style={{ width: "100%", height: "220px", background: animal.color + "18", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", position: "relative" }}>
                  {imageLoading && (
                    <div style={{ fontSize: "48px", animation: "spin 1s linear infinite" }}>🌀</div>
                  )}
                  {!imageLoading && animalImages.length > 0 && (
                    <>
                      <img src={animalImages[imageIndex]} alt={animal.name} style={{ width: "100%", height: "100%", objectFit: "contain", background: animal.color + "18" }} onError={() => setAnimalImages(imgs => imgs.filter((_, i) => i !== imageIndex))} />
                      {animalImages.length > 1 && (
                        <>
                          <button onClick={() => setImageIndex(i => (i - 1 + animalImages.length) % animalImages.length)} style={{ position: "absolute", left: "8px", background: "rgba(255,255,255,0.85)", border: "none", borderRadius: "50%", width: "36px", height: "36px", fontSize: "18px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.15)" }}>‹</button>
                          <button onClick={() => setImageIndex(i => (i + 1) % animalImages.length)} style={{ position: "absolute", right: "8px", background: "rgba(255,255,255,0.85)", border: "none", borderRadius: "50%", width: "36px", height: "36px", fontSize: "18px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.15)" }}>›</button>
                          <div style={{ position: "absolute", bottom: "8px", display: "flex", gap: "6px" }}>
                            {animalImages.map((_, i) => (
                              <div key={i} onClick={() => setImageIndex(i)} style={{ width: "8px", height: "8px", borderRadius: "50%", background: i === imageIndex ? "white" : "rgba(255,255,255,0.5)", cursor: "pointer", boxShadow: "0 1px 3px rgba(0,0,0,0.3)" }} />
                            ))}
                          </div>
                          <button onClick={reportBadPhoto} style={{ position: "absolute", top: "8px", right: "8px", background: "rgba(255,255,255,0.85)", border: "none", borderRadius: "20px", padding: "4px 10px", fontSize: "11px", fontWeight: 800, cursor: "pointer", color: reportCopied ? "#00B894" : "#E17055" }}>
                            {reportCopied ? "✓ Copied!" : "🚩 Bad photo"}
                          </button>
                        </>
                      )}
                    </>
                  )}
                  {!imageLoading && animalImages.length === 0 && (
                    <div style={{ fontSize: "80px" }}>{animal.emoji}</div>
                  )}
                </div>
                <div style={{ padding: "18px 24px 20px" }}>
                  <h2 style={{ fontSize: "30px", fontWeight: 900, color: "#2D3436", margin: "0 0 6px" }}>{animal.name}</h2>
                  <div style={{ display: "inline-block", background: animal.color + "22", color: animal.color, borderRadius: "20px", padding: "4px 16px", fontSize: "14px", fontWeight: 700, marginBottom: "14px" }}>aka "{animal.nickname}"</div>
                  <div>
                    <button onClick={() => toggleFavorite(animal)} style={{
                      background: isFavorited ? "#fff0f6" : "#f8f8f8",
                      border: `2px solid ${isFavorited ? "#E84393" : "#E0E0E0"}`,
                      borderRadius: "50px", padding: "8px 20px", fontSize: "16px", fontWeight: 800,
                      cursor: "pointer", color: isFavorited ? "#E84393" : "#636E72", fontFamily: "inherit",
                    }}>{isFavorited ? "❤️ Saved!" : "🤍 Save to Favorites"}</button>
                  </div>
                </div>
              </div>

              {[
                { icon: "⚡", label: "Super Power", text: animal.superPower, color: "#6C5CE7" },
                { icon: "🍽️", label: "What It Eats", text: animal.whatItEats, color: "#E17055" },
                { icon: "🔊", label: "Its Sound", text: animal.sound, color: "#0984E3" },
              ].map((card, i) => (
                <div key={i} style={{ background: "white", borderRadius: "18px", padding: "16px 20px", marginBottom: "10px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", display: "flex", alignItems: "flex-start", gap: "14px", borderLeft: `4px solid ${card.color}` }}>
                  <span style={{ fontSize: "26px", lineHeight: 1, flexShrink: 0 }}>{card.icon}</span>
                  <div>
                    <div style={{ fontSize: "11px", fontWeight: 800, color: card.color, textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: "3px" }}>{card.label}</div>
                    <div style={{ fontSize: "16px", color: "#2D3436", lineHeight: 1.5, fontWeight: 600 }}>{card.text}</div>
                  </div>
                </div>
              ))}

              <div style={{ background: "white", borderRadius: "18px", padding: "16px 20px", marginBottom: "10px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", display: "flex", alignItems: "flex-start", gap: "14px", borderLeft: "4px solid #E84393" }}>
                <span style={{ fontSize: "26px", lineHeight: 1, flexShrink: 0 }}>🤩</span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "3px" }}>
                    <div style={{ fontSize: "11px", fontWeight: 800, color: "#E84393", textTransform: "uppercase", letterSpacing: "0.8px" }}>Fun Fact</div>
                    <button onClick={() => setFactIndex(i => (i + 1) % animal.funFacts.length)} style={{
                      background: "#E8439318", border: "none", borderRadius: "20px", padding: "3px 10px",
                      fontSize: "12px", fontWeight: 800, color: "#E84393", cursor: "pointer", fontFamily: "inherit",
                    }}>🎲 New fact</button>
                  </div>
                  <div style={{ fontSize: "16px", color: "#2D3436", lineHeight: 1.5, fontWeight: 600 }}>{animal.funFacts[factIndex]}</div>
                  <div style={{ fontSize: "11px", color: "#B2BEC3", marginTop: "4px" }}>{factIndex + 1} of {animal.funFacts.length}</div>
                </div>
              </div>

              <div style={{ background: "white", borderRadius: "18px", marginBottom: "10px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", overflow: "hidden", borderLeft: "4px solid #00B894" }}>
                <div style={{ padding: "12px 20px 8px", display: "flex", alignItems: "center", gap: "10px" }}>
                  <span style={{ fontSize: "26px" }}>📍</span>
                  <div style={{ fontSize: "11px", fontWeight: 800, color: "#00B894", textTransform: "uppercase", letterSpacing: "0.8px" }}>Where It Lives</div>
                </div>
                <div style={{ fontSize: "15px", color: "#2D3436", fontWeight: 600, padding: "0 20px 12px 56px" }}>{animal.whereItLives}</div>
              </div>

              <p style={{ textAlign: "center", color: "#B2BEC3", fontSize: "13px", marginTop: "16px" }}>Tap "New Animal" to discover another one! 🐾</p>
            </div>
          )}

          {!animal && (
            <div style={{ marginTop: "50px", textAlign: "center", color: "#B2BEC3" }}>
              <div style={{ fontSize: "64px" }}>🐾</div>
              <p style={{ fontSize: "17px", marginTop: "12px" }}>Press the button to meet your first animal!</p>
            </div>
          )}
        </>
      )}

      {view === "quiz" && quiz && (
        <div style={{ width: "100%", maxWidth: "480px", marginTop: "8px" }}>
          <div style={{ textAlign: "center", marginBottom: "16px" }}>
            <span style={{ background: "white", borderRadius: "50px", padding: "8px 24px", fontWeight: 800, fontSize: "16px", color: "#2D3436", boxShadow: "0 2px 10px rgba(0,0,0,0.08)" }}>
              ⭐ {quizScore.correct} / {quizScore.total} correct
            </span>
          </div>
          <div style={{ background: "white", borderRadius: "24px", padding: "24px", boxShadow: "0 8px 32px rgba(0,0,0,0.08)", marginBottom: "16px", borderTop: "6px solid #F39C12" }}>
            <div style={{ fontSize: "13px", fontWeight: 800, color: "#F39C12", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: "12px" }}>🔍 Guess the animal!</div>
            {[
              { icon: "⚡", label: "Super Power", text: quiz.animal.superPower },
              { icon: "📍", label: "Where It Lives", text: quiz.animal.whereItLives },
              { icon: "🍽️", label: "What It Eats", text: quiz.animal.whatItEats },
            ].map((clue, i) => (
              <div key={i} style={{ background: "#F8F9FA", borderRadius: "12px", padding: "12px 16px", marginBottom: "8px", display: "flex", gap: "10px", alignItems: "flex-start" }}>
                <span style={{ fontSize: "20px", flexShrink: 0 }}>{clue.icon}</span>
                <div>
                  <div style={{ fontSize: "10px", fontWeight: 800, color: "#B2BEC3", textTransform: "uppercase", letterSpacing: "0.8px" }}>{clue.label}</div>
                  <div style={{ fontSize: "15px", color: "#2D3436", fontWeight: 600 }}>{clue.text}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "16px" }}>
            {quiz.choices.map((choice, i) => {
              const isSelected = quiz.selected === choice.name;
              const isCorrect = choice.name === quiz.animal.name;
              let bg = "white", border = "2px solid #E0E0E0", color = "#2D3436";
              if (quiz.selected) {
                if (isCorrect) { bg = "#00B894"; border = "2px solid #00B894"; color = "white"; }
                else if (isSelected) { bg = "#E17055"; border = "2px solid #E17055"; color = "white"; }
              }
              return (
                <button key={i} onClick={() => handleQuizAnswer(choice)} style={{
                  background: bg, border, borderRadius: "16px", padding: "16px 12px", fontSize: "15px",
                  fontWeight: 800, cursor: quiz.selected ? "default" : "pointer", color,
                  fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center",
                  gap: "6px", boxShadow: "0 4px 12px rgba(0,0,0,0.06)",
                }}>
                  <span style={{ fontSize: "28px" }}>{choice.emoji}</span>
                  <span>{choice.name}</span>
                </button>
              );
            })}
          </div>
          {quiz.selected && (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: "22px", fontWeight: 900, color: quiz.correct ? "#00B894" : "#E17055", marginBottom: "8px" }}>
                {quiz.correct ? "🎉 That's right!" : `❌ It was the ${quiz.animal.name}!`}
              </div>
              <div style={{ fontSize: "14px", color: "#636E72", marginBottom: "16px" }}>aka "{quiz.animal.nickname}"</div>
              <button onClick={() => nextQuizQuestion(quiz.animal)} style={{
                background: "linear-gradient(135deg, #F39C12, #FDCB6E)", color: "white", border: "none",
                borderRadius: "50px", padding: "14px 36px", fontSize: "18px", fontWeight: 800,
                cursor: "pointer", fontFamily: "inherit", boxShadow: "0 4px 16px rgba(243,156,18,0.4)",
              }}>Next Animal ➡️</button>
            </div>
          )}
        </div>
      )}

      {view === "favorites" && (
        <div style={{ width: "100%", maxWidth: "480px", marginTop: "8px" }}>
          {favorites.length === 0 ? (
            <div style={{ textAlign: "center", color: "#B2BEC3", marginTop: "40px" }}>
              <div style={{ fontSize: "64px" }}>🤍</div>
              <p style={{ fontSize: "17px", marginTop: "12px" }}>No favorites yet! Go explore and save animals you love.</p>
            </div>
          ) : (
            <>
              <p style={{ textAlign: "center", color: "#636E72", fontSize: "15px", marginBottom: "16px" }}>Your favorite animals ❤️</p>
              {favorites.map((fav, i) => (
                <div key={i} onClick={() => { setAnimal(fav); setBgColor(pastelBg[Math.floor(Math.random() * pastelBg.length)]); setBounce(false); setImgError(false); setFactIndex(0); setView("explore"); setTimeout(() => setBounce(true), 50); }}
                  style={{ background: "white", borderRadius: "20px", padding: "16px 20px", marginBottom: "12px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", borderLeft: `5px solid ${fav.color}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px", cursor: "pointer" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
                    <span style={{ fontSize: "36px" }}>{fav.emoji}</span>
                    <div>
                      <div style={{ fontWeight: 900, fontSize: "17px", color: "#2D3436" }}>{fav.name}</div>
                      <div style={{ fontSize: "13px", color: fav.color, fontWeight: 700 }}>aka "{fav.nickname}"</div>
                      <div style={{ fontSize: "12px", color: "#B2BEC3", marginTop: "2px" }}>Tap to view ›</div>
                    </div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); toggleFavorite(fav); }} style={{ background: "none", border: "none", fontSize: "22px", cursor: "pointer", padding: "4px" }}>❤️</button>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AnimalExplorer />);
  </script>
</body>
</html>
